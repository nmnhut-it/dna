<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DNA Dashboard</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1>DNA</h1>
    <nav>
      <button class="tab active" data-tab="live">Live</button>
      <button class="tab" data-tab="chats">Chats</button>
      <button class="tab" data-tab="settings">Settings</button>
    </nav>
    <span id="status" class="status offline">offline</span>
  </header>
  <main>
    <!-- Live Feed -->
    <section id="tab-live" class="panel">
      <div class="panel-header">
        <h2>Live Feed</h2>
        <select id="live-filter">
          <option value="all">All</option>
          <option value="messages">Messages only</option>
          <option value="logs">Logs only</option>
        </select>
      </div>
      <div id="live-feed" class="feed"></div>
    </section>

    <!-- Chats (per-chat management) -->
    <section id="tab-chats" class="panel hidden">
      <div class="sidebar" id="chat-sidebar">
        <h3>Chats</h3>
        <div id="chat-list"></div>
      </div>
      <div class="content-area" id="chat-content">
        <p class="placeholder">Select a chat</p>
      </div>
    </section>

    <!-- Settings -->
    <section id="tab-settings" class="panel hidden">
      <div class="settings-grid">
        <div class="settings-section">
          <h3>Allowed Chats</h3>
          <div id="paired-list"></div>
          <form id="pair-form" class="inline-form">
            <input type="number" name="id" placeholder="Chat ID">
            <button type="submit">Add</button>
          </form>
        </div>
        <div class="settings-section">
          <h3>Bot Config</h3>
          <label>History Limit <input type="number" id="cfg-historyLimit"></label>
          <label>Web Port <input type="number" id="cfg-webPort"></label>
          <button id="save-config" class="btn-primary">Save</button>
        </div>
        <div class="settings-section">
          <h3>Notifications</h3>
          <label class="toggle-label">
            <input type="checkbox" id="cfg-notifications">
            Browser notifications for new messages
          </label>
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js"></script>
</body>
</html>
